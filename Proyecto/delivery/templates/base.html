<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastroTech - Experiencia Culinaria</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Tailwind CSS (Play CDN for dev, should be built in prod) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            light: '#f8fafc',
                            primary: '#e11d48', // Rose 600
                            accent: '#fbbf24', // Amber 400
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc;}
        h1, h2, h3, h4, .font-display { font-family: 'Outfit', sans-serif; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen bg-brand-dark overflow-x-hidden">
    <!-- Navbar Premium -->
    <nav class="fixed w-full z-50 glass-panel border-b-0 border-white/10 top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0">
                    <span class="text-3xl font-display font-bold text-white tracking-tight">Gastro<span class="text-brand-primary">Tech</span></span>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="#" class="text-white hover:text-brand-accent px-3 py-2 rounded-md font-medium transition-colors">Carta</a>
                        <a href="#" class="text-gray-300 hover:text-white px-3 py-2 rounded-md font-medium transition-colors">Menú Diario</a>
                        <a href="#" class="text-gray-300 hover:text-white px-3 py-2 rounded-md font-medium transition-colors">Nosotros</a>
                        <button class="bg-brand-primary hover:bg-rose-700 text-white px-5 py-2 rounded-full font-semibold transition-all transform hover:scale-105 shadow-[0_0_15px_rgba(225,29,72,0.5)]">
                            Pedir Ahora
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-12">
        {% block content %}{% endblock %}
    </main>

    <footer class="glass-panel mt-16 py-8 text-center text-gray-400">
        <p>&copy; 2026 GastroTech - Arquitectura Limpia & Modernidad</p>
    </footer>
</body>
</html>
