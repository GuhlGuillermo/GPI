<div class="w-full animate-fade-in">
    <div class="flex items-center justify-between mb-8">
        <h2 class="text-4xl font-display font-bold text-white">Nuestra Carta</h2>
        <div class="h-1 flex-1 mx-6 bg-gradient-to-r from-brand-primary/50 to-transparent rounded-full"></div>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        {% for plato in platos %}
        <div class="glass-panel p-6 rounded-2xl hover:-translate-y-2 transition-transform duration-300 group shadow-lg hover:shadow-[0_0_25px_rgba(251,191,36,0.15)] relative overflow-hidden">
            <!-- Decorative circle -->
            <div class="absolute -right-8 -top-8 w-24 h-24 bg-brand-primary/10 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
            
            <div class="flex justify-between items-start mb-4 relative z-10">
                <h3 class="text-2xl font-bold text-white font-display">{{ plato.nombre }}</h3>
                <span class="bg-brand-accent text-brand-dark px-3 py-1 rounded-full font-bold shadow">${{ plato.precio }}</span>
            </div>
            <p class="text-gray-400 mb-6 relative z-10">{{ plato.descripcion }}</p>
            <button 
                class="w-full border-2 border-brand-primary text-brand-primary hover:bg-brand-primary hover:text-white py-2 rounded-xl font-semibold transition-colors relative z-10">
                Añadir al pedido
            </button>
        </div>
        {% empty %}
        <div class="col-span-full text-center text-gray-500 py-10">
            No hay platos disponibles en la carta por ahora.
        </div>
        {% endfor %}
    </div>
</div>
